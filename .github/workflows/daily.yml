name: daily-gpu-fetch

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间早上 9 点
  workflow_dispatch:        # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许 workflow 推送 commit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch GPU prices
        run: python fetch_vast.py

      - name: Generate dashboard
        run: python make_dashboard.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard.html
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"

      - name: Push
        run: git push
